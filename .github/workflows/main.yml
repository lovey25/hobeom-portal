name: Deploy to Server

on:
  # workflow_dispatch: # 수동 실행만 가능하도록 변경
  push:
    branches: [main] # 자동 배포 재개 시 주석 해제

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} "bash -l -c '
            set -e && \
            cd /home/${{ secrets.USERNAME }}/Workspace/hobeom-portal && \
            git fetch origin && \
            git reset --hard origin/main && \
            git clean -fd && \
            source ~/.nvm/nvm.sh && \
            nvm use && \
            npm ci && \
            npm run build && \
            pm2 reload hobeom-portal
          '"
